---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-robopd2-infra
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  robopd2-infra.json: |
    {
      "annotations": { "list": [] },
      "description": "RoboPD2 DO Droplet - Node & PostgreSQL metrics",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Node - CPU & Memory",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 20, "lineWidth": 1, "pointSize": 5, "showPoints": "never", "stacking": { "mode": "none" } },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"robopd2-do-node\", mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU Usage %",
              "refId": "A"
            }
          ],
          "title": "CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 20, "lineWidth": 1, "pointSize": 5, "showPoints": "never", "stacking": { "mode": "normal" } },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "options": { "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{job=\"robopd2-do-node\"} - node_memory_MemAvailable_bytes{job=\"robopd2-do-node\"}",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "expr": "node_memory_MemAvailable_bytes{job=\"robopd2-do-node\"}",
              "legendFormat": "Available",
              "refId": "B"
            }
          ],
          "title": "Memory Usage",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 4,
          "title": "Node - Disk & Network",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 10 },
          "id": 5,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "100 - ((node_filesystem_avail_bytes{job=\"robopd2-do-node\", mountpoint=\"/\", fstype!=\"tmpfs\"} / node_filesystem_size_bytes{job=\"robopd2-do-node\", mountpoint=\"/\", fstype!=\"tmpfs\"}) * 100)",
              "legendFormat": "Root /",
              "refId": "A"
            }
          ],
          "title": "Disk Usage",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "pointSize": 5, "showPoints": "never", "stacking": { "mode": "none" } },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 10 },
          "id": 6,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{job=\"robopd2-do-node\", device!~\"lo|veth.*|cali.*|flannel.*\"}[5m])",
              "legendFormat": "{{device}} RX",
              "refId": "A"
            },
            {
              "expr": "-rate(node_network_transmit_bytes_total{job=\"robopd2-do-node\", device!~\"lo|veth.*|cali.*|flannel.*\"}[5m])",
              "legendFormat": "{{device}} TX",
              "refId": "B"
            }
          ],
          "title": "Network I/O",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "pointSize": 5, "showPoints": "never", "stacking": { "mode": "none" } },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 10 },
          "id": 7,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "node_load1{job=\"robopd2-do-node\"}",
              "legendFormat": "1m",
              "refId": "A"
            },
            {
              "expr": "node_load5{job=\"robopd2-do-node\"}",
              "legendFormat": "5m",
              "refId": "B"
            },
            {
              "expr": "node_load15{job=\"robopd2-do-node\"}",
              "legendFormat": "15m",
              "refId": "C"
            }
          ],
          "title": "System Load",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 10,
          "title": "PostgreSQL",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 90 }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 19 },
          "id": 11,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "pg_stat_activity_count{job=\"robopd2-do-postgres\", datname=\"robopd2\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Active Connections",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.9 }, { "color": "red", "value": 0.8 }] },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 19 },
          "id": 12,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "pg_stat_database_blks_hit{job=\"robopd2-do-postgres\", datname=\"robopd2\"} / (pg_stat_database_blks_hit{job=\"robopd2-do-postgres\", datname=\"robopd2\"} + pg_stat_database_blks_read{job=\"robopd2-do-postgres\", datname=\"robopd2\"})",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Cache Hit Ratio",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 19 },
          "id": 13,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "pg_database_size_bytes{job=\"robopd2-do-postgres\", datname=\"robopd2\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Database Size",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 19 },
          "id": 14,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "pg_stat_database_numbackends{job=\"robopd2-do-postgres\", datname=\"robopd2\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Backends",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "pointSize": 5, "showPoints": "never", "stacking": { "mode": "none" } },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 25 },
          "id": 15,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "rate(pg_stat_database_xact_commit{job=\"robopd2-do-postgres\", datname=\"robopd2\"}[5m])",
              "legendFormat": "Commits/s",
              "refId": "A"
            },
            {
              "expr": "rate(pg_stat_database_xact_rollback{job=\"robopd2-do-postgres\", datname=\"robopd2\"}[5m])",
              "legendFormat": "Rollbacks/s",
              "refId": "B"
            }
          ],
          "title": "Transactions/s",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "axisPlacement": "auto", "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "pointSize": 5, "showPoints": "never", "stacking": { "mode": "none" } },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 25 },
          "id": 16,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "rate(pg_stat_database_tup_returned{job=\"robopd2-do-postgres\", datname=\"robopd2\"}[5m])",
              "legendFormat": "Rows returned/s",
              "refId": "A"
            },
            {
              "expr": "rate(pg_stat_database_tup_fetched{job=\"robopd2-do-postgres\", datname=\"robopd2\"}[5m])",
              "legendFormat": "Rows fetched/s",
              "refId": "B"
            },
            {
              "expr": "rate(pg_stat_database_tup_inserted{job=\"robopd2-do-postgres\", datname=\"robopd2\"}[5m])",
              "legendFormat": "Rows inserted/s",
              "refId": "C"
            }
          ],
          "title": "Row Operations/s",
          "type": "timeseries"
        }
      ],
      "refresh": "60s",
      "schemaVersion": 39,
      "tags": ["robopd2", "infrastructure"],
      "templating": { "list": [] },
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "RoboPD2 Infrastructure (DO)",
      "uid": "robopd2-infra",
      "version": 1
    }
